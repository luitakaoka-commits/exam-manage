<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6d28d9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="進度管理" />
  <meta name="description" content="テスト勉強の学習進度・復習スケジュール管理アプリ" />

  <title>テスト勉強 進度管理</title>

  <!-- PWA manifest: 相対パスで指定 -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple Touch Icon: 相対パス -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- Tailwind CSS (JIT runtime) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Shippori Mincho"', 'serif'],
            body: ['"Zen Kaku Gothic New"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior-y: contain; }
    :root { color-scheme: light; }
    nav.fixed { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-stone-50">
  <div id="root"></div>

  <!-- Bundled app: 相対パス -->
  <script src="bundle.js"></script>

  <!-- Service Worker: 相対パスで登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 現在のページと同じディレクトリのsw.jsを登録
        const swPath = new URL('sw.js', import.meta.url || location.href).pathname;
        navigator.serviceWorker.register(swPath)
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
